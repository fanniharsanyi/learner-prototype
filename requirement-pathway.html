<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Requirement pathway · CVC Exchange</title>
<link rel="stylesheet" href="assets/styles.css?v=44">
</head>
<body>
<main>
  <div class="page">
    <a class="back" href="program-detail.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg>
      Back to pathway
    </a>

    <div class="rq-head">
      <div class="rq-head__tags" id="rqTags"></div>
      <h1 class="h1" id="rqTitle">Requirement</h1>
      <p class="rc-sub" id="rqSub"></p>
    </div>

    <div class="notice notice--info" id="rqRule"></div>
    <div class="notice notice--warning" id="rqHome" hidden style="margin-top:12px;"></div>

    <div id="rqStruct"></div>

    <p class="rq-cta__note" style="margin-top:20px;">Enrolling is done through the CVC Exchange — no separate application to the teaching college.</p>
  </div>
</main>
<script src="assets/app.js?v=44"></script>
<script>
mountStudentChrome('collaboratives');

/* Requirement structures mirror the collaborative contributor "Define requirement details"
   flow: each requirement has a combine rule (all = AND, any = OR) and one or
   more components, each holding the approved courses (by code) that fulfill it.
   Full course data lives in COURSE_CATALOG (assets/app.js). */
const REQSTRUCT = {
  'Lower-division core': {
    desc: 'Complete the lower-division core — a composition course and an anatomy course.',
    combine: 'all', home: false,
    components: [
      { name: 'College Composition', rule: 'Pick 1 course · Min grade C', codes: ['ENGL 101', 'ENGL 105'] },
      { name: 'Human Anatomy', rule: 'Pick 1 course · Min grade C', codes: ['BIOL 6A'] },
    ],
  },
  'Quantitative or behavioral': {
    desc: 'Complete one quantitative or behavioral course.',
    combine: 'any', home: false,
    components: [
      { name: 'Introduction to Psychology', rule: 'Pick 1 course · Min grade C', codes: ['PSYC 101', 'PSYC 100'] },
      { name: 'College Algebra', rule: 'Pick 1 course · Min grade C', codes: ['MATH 110'] },
    ],
  },
  'Allied-health foundations': {
    desc: 'Complete the allied-health foundation course.',
    combine: 'all', home: false,
    components: [
      { name: 'Medical Terminology', rule: 'Pick 1 course · Min grade C', codes: ['HLTH 50'] },
    ],
  },
};

const HOME_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11l8-7 8 7M6 10v9h12v-9"/></svg>';
const INFO_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>';
const WARN_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h16.9a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>';
const CHECK_SVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>';
const ARROW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

const reqName = new URLSearchParams(location.search).get('req') || 'Lower-division core';
const req = REQSTRUCT[reqName] || REQSTRUCT['Lower-division core'];
document.title = reqName + ' · CVC Exchange';

/* ---- A single merged course card (was requirement-courses + pathway) ---- */
function courseCard(code, reqName) {
  const c = COURSE_CATALOG[code];
  if (!c) return '';
  const enrolled = isEnrolled(code);
  const detailHref = 'course-detail.html?req=' + encodeURIComponent(reqName) + '&code=' + encodeURIComponent(code);
  const action = enrolled
    ? 'View your enrollment in ' + c.code + ' — ' + c.name
    : 'View ' + c.code + ' — ' + c.name + ' course details and sections to enroll';
  const chips =
    (c.quality ? '<span class="ccard__chip"><img class="cr-ic-q" src="assets/ic-quality.png" alt=""> Quality Reviewed</span>' : '') +
    (c.ztc ? '<span class="ccard__chip"><img class="cr-ic-z" src="assets/ic-ztc.png" alt=""> Zero Textbook Cost</span>' : '');

  return '<article class="ccard' + (enrolled ? ' ccard--enrolled' : '') + '" data-code="' + esc(code) + '">' +
    '<div class="ccard__main">' +
      '<div class="ccard__inst">' + esc(c.inst) + '</div>' +
      '<a class="ccard__title" href="' + detailHref + '">' + esc(c.code) + ' — ' + esc(c.name) + '</a>' +
      '<div class="ccard__meta">' + esc(c.units) + ' units <span aria-hidden="true">·</span> Min grade ' + esc(c.grade) +
        ' <span aria-hidden="true">·</span> C-ID ' + esc(c.cid) + '</div>' +
      '<div class="ccard__chips">' + chips + '</div>' +
    '</div>' +
    '<div class="ccard__aside">' +
      (enrolled
        ? '<span class="pill pill--done">' + CHECK_SVG + ' Enrolled</span>'
        : '<span class="ccard__open">' + esc(c.status) + '</span>') +
      '<span class="ccard__price"><small>Tuition</small>' + esc(c.tuition) + '</span>' +
      '<span class="ccard__cue">' + (enrolled ? 'View enrollment ' : 'View course ') + ARROW_SVG + '</span>' +
      (enrolled ? '<button type="button" class="ccard__drop" data-drop="' + esc(code) + '">Drop course</button>' : '') +
    '</div>' +
    '<a class="ccard__hit" href="' + detailHref + '" aria-label="' + esc(action) + '"></a>' +
  '</article>';
}

/* Render one component: all cards, or (once a course is picked) just the
   selected card plus an accordion of the others. */
function paintComponent(host, comp, ci) {
  // Pick-1: the selected course is whatever the student enrolled in (on the
  // course-detail page). If somehow more than one in this component is enrolled,
  // keep the most recent and drop the rest.
  const enrolledInComp = comp.codes.filter(isEnrolled);
  const selected = enrolledInComp.length ? enrolledInComp[enrolledInComp.length - 1] : null;
  enrolledInComp.forEach(function (c) { if (c !== selected) unenrollCourse(c); });
  const others = comp.codes.filter(function (c) { return c !== selected; });
  let html =
    '<div class="comp__head"><span class="comp__name">' + esc(comp.name) + '</span></div>' +
    '<div class="comp__rule">' + esc(comp.rule) + '</div>';

  if (selected) {
    html += '<div class="comp-cards">' + courseCard(selected, reqName) + '</div>';
    if (others.length) {
      const panelId = 'more-' + ci;
      html += '<div class="ccard-more">' +
        '<button type="button" class="ccard-more__btn" aria-expanded="false" aria-controls="' + panelId + '">' +
          '<span>Show other courses (' + others.length + ')</span>' +
          '<svg class="ccard-more__chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>' +
        '</button>' +
        '<div class="ccard-more__panel comp-cards" id="' + panelId + '" hidden>' +
          others.map(function (code) { return courseCard(code, reqName); }).join('') +
        '</div>' +
      '</div>';
    }
  } else {
    html += '<div class="comp-cards">' + comp.codes.map(function (code) { return courseCard(code, reqName); }).join('') + '</div>';
  }

  host.innerHTML = html;
  wireComponent(host, comp, ci);
}

function wireComponent(host, comp, ci) {
  // The full-card overlay is a plain link to the course-detail page — enrolling
  // happens there, not on this card. No click handler needed for it.
  // Drop / unenroll (deliberate secondary action, raised above the card overlay).
  host.querySelectorAll('.ccard__drop').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      const code = btn.dataset.drop;
      unenrollCourse(code);
      paintComponent(host, comp, ci);
      toastNow(code + ' dropped — you can re-enroll below');
    });
  });
  // Accordion toggle.
  const acc = host.querySelector('.ccard-more__btn');
  if (acc) {
    acc.addEventListener('click', function () {
      const open = acc.getAttribute('aria-expanded') === 'true';
      acc.setAttribute('aria-expanded', String(!open));
      const panel = document.getElementById(acc.getAttribute('aria-controls'));
      if (panel) panel.hidden = open;
    });
  }
}

(function render() {
  // tags
  let tags = '<span class="tag tag--required">Required</span>';
  if (req.home) tags += '<span class="tag tag--home">' + HOME_SVG + ' Home institution only</span>';
  document.getElementById('rqTags').innerHTML = tags;

  document.getElementById('rqTitle').textContent = reqName;
  document.getElementById('rqSub').textContent = req.desc;

  const isAll = req.combine === 'all';
  document.getElementById('rqRule').innerHTML =
    '<span class="notice__icon">' + INFO_SVG + '</span>' +
    '<div>To fulfill this requirement, complete <b>' +
    (isAll ? 'all of the components' : 'any one of the components') +
    '</b> below. This structure is set by the collaborative manager.</div>';

  if (req.home) {
    const home = document.getElementById('rqHome');
    home.hidden = false;
    home.innerHTML = '<span class="notice__icon">' + WARN_SVG + '</span>' +
      '<div>These courses must be taken at your home college (UC San Diego).</div>';
  }

  // components, joined by AND (all) or OR (any) connectors
  const connClass = isAll ? 'req-conn--and' : 'req-conn--or';
  const connLabel = isAll ? 'AND' : 'OR';
  const root = document.getElementById('rqStruct');
  req.components.forEach(function (comp, ci) {
    if (ci > 0) {
      const conn = document.createElement('div');
      conn.className = 'req-conn ' + connClass;
      conn.innerHTML = '<span>' + connLabel + '</span>';
      root.appendChild(conn);
    }
    const wrap = document.createElement('div');
    wrap.className = 'comp';
    root.appendChild(wrap);
    paintComponent(wrap, comp, ci);
  });
})();
</script>
</body>
</html>
